services:
  - type: web
    name: telegram-trading-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    autoDeploy: true
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: PUBLIC_CHANNEL_CHAT_ID
        sync: false
      - key: OWNER_CHAT_ID
        sync: false
      - key: BRAND_NAME
        sync: false
      - key: DATA_DIR
        sync: false
